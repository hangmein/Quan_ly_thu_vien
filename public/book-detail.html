<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết Tác phẩm — BIBLIOTHECA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  :root{
    --bg:#0a0806; --bg-card:#14100c; --bg-elevated:#1c1612;
    --ink:#e8dcc4; --ink-muted:#8a7a60; --ink-faint:#5a4d3a;
    --gold:#c9a96e; --gold-bright:#e6c989; --border:rgba(201,169,110,.18);
    --ok:#8fc972; --err:#c97272;
  }
  body{ background:var(--bg); color:var(--ink); }

  .detail-container { max-width: 1200px; margin: 120px auto 80px; padding: 0 40px; }

  .back-btn { display: inline-flex; align-items:center; gap:8px; color: var(--ink-muted); font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px; text-decoration: none; margin-bottom: 40px; transition: color .3s, transform .3s; }
  .back-btn:hover { color: var(--gold); transform: translateX(-4px); }

  .glow-stage{ position:relative; }
  .glow-stage::before{
    content:''; position:absolute; inset:-1px; z-index:0; pointer-events:none;
    background: radial-gradient(600px 300px at 25% 20%, rgba(201,169,110,.10), transparent 70%);
    border-radius:6px;
  }

  .book-detail-wrapper {
    position:relative; z-index:1;
    display: grid; grid-template-columns: 1fr 2fr; gap: 60px;
    align-items: start;                 /* sửa: cột bìa không bị kéo giãn xuống */
    background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
    border: 1px solid var(--border); padding: 60px; border-radius: 4px;
    box-shadow: 0 30px 60px rgba(0,0,0,.45);
    opacity:0; transform: translateY(18px); animation: rise .7s ease forwards;
  }
  @keyframes rise{ to{ opacity:1; transform:none; } }

  /* --- Cột bìa --- */
  .cover-frame{ position:relative; }
  .cover-frame .img-box{ position:relative; }
  .cover-frame .img-box::after{
    content:''; position:absolute; inset:10px; border:1px solid var(--border);
    pointer-events:none; border-radius:3px; mix-blend-mode:screen;
  }
  .detail-cover { display:block; width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; box-shadow: 0 20px 45px rgba(0,0,0,.65); transition: transform .5s ease; }
  .cover-frame:hover .detail-cover{ transform: translateY(-6px); }

  /* Thanh tiện ích dưới bìa */
  .cover-actions{ margin-top:18px; display:flex; flex-direction:column; gap:10px; }
  .util-btn{ display:flex; align-items:center; justify-content:center; gap:9px; padding:11px; background:transparent; border:1px solid var(--border); color:var(--ink-muted); font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; cursor:pointer; border-radius:3px; transition:all .3s; }
  .util-btn:hover{ border-color:var(--gold); color:var(--gold); }
  .util-btn .ic{ font-size:14px; line-height:1; }
  .util-btn.fav-on{ border-color:#c97272; color:#e08a8a; background:rgba(201,114,114,.06); }

  /* --- Cột thông tin --- */
  .eyebrow{ color: var(--gold); font-size: 12px; letter-spacing: 5px; font-family: 'Cinzel',serif; margin-bottom: 14px; display:flex; align-items:center; gap:12px; }
  .eyebrow::before,.eyebrow::after{ content:''; height:1px; width:34px; background:linear-gradient(90deg,transparent,var(--gold)); }
  .eyebrow::after{ background:linear-gradient(90deg,var(--gold),transparent); }

  .detail-info h1 { font-family: 'Cormorant Garamond', serif; font-weight:600; font-size: 52px; color: var(--ink); line-height: 1.08; margin-bottom: 8px; }
  .detail-info .author { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 24px; color: var(--ink-muted); margin-bottom: 18px; }
  .genre-pill{ display:inline-block; padding:5px 16px; border:1px solid var(--border); background:rgba(201,169,110,.08); color:var(--gold); font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; margin-bottom: 30px; border-radius:2px; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 36px; padding-bottom: 36px; border-bottom: 1px solid var(--border); }
  .info-item { display: flex; flex-direction: column; gap: 6px; }
  .info-label { font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; color: var(--ink-muted); letter-spacing: 1px; }
  .info-value { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold-bright); }
  .stars{ color:var(--gold); letter-spacing:2px; }
  .rating-num{ color:var(--ink-muted); font-size:13px; }

  .stock-box { background: rgba(201,169,110,.05); border: 1px solid var(--border); padding: 22px 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-radius:3px; }
  .stock-box .status { font-family: 'Cinzel', serif; font-size: 18px; }

  .btn-primary{ width:100%; text-align:center; padding:16px; font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px; color:var(--bg); background:linear-gradient(180deg,var(--gold-bright),var(--gold)); border:none; cursor:pointer; border-radius:3px; transition:filter .3s, transform .2s, box-shadow .3s; }
  .btn-primary:hover{ filter:brightness(1.08); box-shadow:0 10px 26px rgba(201,169,110,.28); transform:translateY(-2px); }
  .btn-primary:disabled{ opacity:.6; cursor:wait; transform:none; box-shadow:none; }

  /* --- Tóm tắt --- */
  .summary-panel{
    position:relative; z-index:1; margin-top: 28px; padding: 50px 60px;
    background: linear-gradient(180deg, var(--bg-card), var(--bg-elevated));
    border:1px solid var(--border); border-radius:4px; box-shadow:0 20px 40px rgba(0,0,0,.35);
    opacity:0; transform: translateY(18px); animation: rise .7s .15s ease forwards;
  }
  .summary-head{ display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:30px; }
  .summary-head .orn{ color:var(--gold); font-size:14px; }
  .summary-head .ttl{ font-family:'Cinzel',serif; font-size:13px; letter-spacing:4px; color:var(--ink); }
  .summary-body{ position:relative; font-family:'Cormorant Garamond',serif; font-size:20px; line-height:1.85; color:var(--ink); text-align:justify; }
  .summary-body::before{ content:'\201C'; position:absolute; top:-40px; left:-18px; font-family:'Cormorant Garamond',serif; font-size:120px; color:var(--border); line-height:1; pointer-events:none; }
  .summary-body::first-letter{ font-family:'Cinzel',serif; font-size:46px; color:var(--gold); float:left; line-height:.9; margin:6px 12px 0 0; }
  .summary-body.summary-empty{ font-style:italic; color:var(--ink-muted); text-align:center; }
  .summary-body.summary-empty::before,.summary-body.summary-empty::first-letter{ all:unset; }

  /* --- Sách cùng thể loại --- */
  .related-panel{ position:relative; z-index:1; margin-top:28px; opacity:0; transform:translateY(18px); animation:rise .7s .25s ease forwards; }
  .related-head{ display:flex; align-items:center; gap:14px; margin-bottom:24px; }
  .related-head .ttl{ font-family:'Cinzel',serif; font-size:13px; letter-spacing:4px; color:var(--ink); white-space:nowrap; }
  .related-head .line{ flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
  .related-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:20px; }
  .rel-card{ text-decoration:none; background:var(--bg-card); border:1px solid var(--border); border-radius:3px; overflow:hidden; transition:transform .3s, border-color .3s; display:block; }
  .rel-card:hover{ transform:translateY(-5px); border-color:var(--gold); }
  .rel-cover{ width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:linear-gradient(135deg,#2a1810,#0a0805); }
  .rel-cover-ph{ display:grid; place-items:center; color:var(--gold); font-size:28px; }
  .rel-body{ padding:12px 14px; }
  .rel-title{ font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--ink); line-height:1.25; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .rel-author{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--ink-muted); }

  /* --- Toast --- */
  #toast{ position:fixed; left:50%; bottom:34px; transform:translateX(-50%) translateY(20px); background:var(--bg-elevated); border:1px solid var(--gold); color:var(--gold-bright); font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; padding:13px 26px; border-radius:3px; box-shadow:0 12px 30px rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .35s, transform .35s; z-index:200; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width: 900px) {
    .detail-container{ padding:0 20px; }
    .book-detail-wrapper { grid-template-columns: 1fr; padding: 30px; gap:36px; }
    .cover-frame{ max-width: 320px; margin: 0 auto; width:100%; }
    .detail-info h1{ font-size:40px; }
    .summary-panel{ padding:34px 26px; }
    .summary-body{ font-size:18px; }
  }

  /* --- Khi in trang --- */
  @media print{
    nav,.back-btn,.cover-actions,#btn-borrow,.related-panel,#toast{ display:none !important; }
    body{ background:#fff; color:#000; }
    .book-detail-wrapper,.summary-panel{ box-shadow:none; border:1px solid #ccc; background:#fff; animation:none; opacity:1; transform:none; }
    .detail-info h1,.info-value,.summary-head .ttl{ color:#000; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">BIBLIOTHECA</div>
  <ul class="nav-links">
    <li><a href="/">Trang chủ</a></li>
    <li><a href="/#genres">Thể loại</a></li>
    <li><a href="/login.html">Đăng nhập</a></li>
  </ul>
</nav>

<div class="detail-container">
  <a href="/" class="back-btn">← TRỞ VỀ THƯ VIỆN</a>

  <div class="glow-stage" id="detail-wrapper" style="display:none;">
    <div class="book-detail-wrapper">
      <div class="left-col cover-frame">
        <div class="img-box" id="cover-container"></div>
        <div class="cover-actions">
          <button class="util-btn" id="btn-fav" onclick="toggleFav()"><span class="ic">♡</span> <span id="fav-text">YÊU THÍCH</span></button>
          <button class="util-btn" onclick="shareBook()"><span class="ic">⇪</span> CHIA SẺ</button>
          <button class="util-btn" onclick="window.print()"><span class="ic">⎙</span> IN THÔNG TIN</button>
        </div>
      </div>

      <div class="detail-info">
        <div class="eyebrow">CHI TIẾT TÁC PHẨM</div>
        <h1 id="book-title">Đang tải...</h1>
        <div class="author" id="book-author">...</div>
        <span class="genre-pill" id="book-genre-pill">...</span>

        <div class="info-grid">
          <div class="info-item"><span class="info-label">Thể loại</span><span class="info-value" id="book-genre">...</span></div>
          <div class="info-item"><span class="info-label">Năm xuất bản</span><span class="info-value" id="book-year">...</span></div>
          <div class="info-item"><span class="info-label">Nhà xuất bản</span><span class="info-value" id="book-publisher">...</span></div>
          <div class="info-item"><span class="info-label">Ngôn ngữ</span><span class="info-value" id="book-lang">...</span></div>
          <div class="info-item"><span class="info-label">Mã ISBN</span><span class="info-value" id="book-isbn" style="color: var(--ink);">...</span></div>
          <div class="info-item"><span class="info-label">Đánh giá</span><span class="info-value" id="book-rating">...</span></div>
        </div>

        <div class="stock-box">
          <div>
            <div class="info-label" style="margin-bottom: 5px;">Tình trạng lưu trữ</div>
            <div class="info-value" style="color: var(--ink); font-family: 'Inter'; font-size: 14px;" id="book-shelf">Vị trí: ...</div>
          </div>
          <div class="status" id="book-status">...</div>
        </div>

        <button class="btn-primary" id="btn-borrow">MƯỢN TÁC PHẨM NÀY</button>
      </div>
    </div>

    <!-- TÓM TẮT -->
    <div class="summary-panel">
      <div class="summary-head">
        <span class="orn">❦</span><span class="ttl">TÓM TẮT TÁC PHẨM</span><span class="orn">❦</span>
      </div>
      <div class="summary-body" id="book-summary">Đang tải...</div>
    </div>

    <!-- SÁCH CÙNG THỂ LOẠI -->
    <div class="related-panel" id="related-panel" style="display:none;">
      <div class="related-head">
        <span class="ttl">CÓ THỂ BẠN QUAN TÂM</span><span class="line"></span>
      </div>
      <div class="related-grid" id="related-grid"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const bookId = urlParams.get('id');

  /* ---------- Tiện ích chung ---------- */
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=> t.classList.remove('show'), 2600);
  }

  function getFavs(){ try { return JSON.parse(localStorage.getItem('favorites') || '[]'); } catch(e){ return []; } }
  function setFavs(arr){ try { localStorage.setItem('favorites', JSON.stringify(arr)); } catch(e){} }

  function syncFavBtn(){
    const on = getFavs().map(String).includes(String(bookId));
    const btn = document.getElementById('btn-fav');
    btn.classList.toggle('fav-on', on);
    btn.querySelector('.ic').textContent = on ? '♥' : '♡';
    document.getElementById('fav-text').textContent = on ? 'ĐÃ THÍCH' : 'YÊU THÍCH';
  }
  function toggleFav(){
    let favs = getFavs().map(String);
    const id = String(bookId);
    if (favs.includes(id)) { favs = favs.filter(x=>x!==id); showToast('Đã bỏ khỏi danh sách yêu thích'); }
    else { favs.push(id); showToast('Đã thêm vào danh sách yêu thích'); }
    setFavs(favs); syncFavBtn();
  }
  function shareBook(){
    const url = window.location.href;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(()=>showToast('Đã sao chép liên kết')).catch(()=>showToast(url));
    } else { showToast(url); }
  }

  /* ---------- Tải chi tiết sách ---------- */
  async function fetchBookDetail() {
    if (!bookId) { alert("Không tìm thấy mã sách!"); window.location.href = '/'; return; }
    try {
      const response = await fetch(`/api/books/${bookId}`);
      if (!response.ok) throw new Error("Sách không tồn tại");
      const sach = await response.json();

      document.getElementById('book-title').textContent = sach.tieu_de;
      document.getElementById('book-author').textContent = sach.tac_gia || 'Đang cập nhật';
      document.getElementById('book-genre').textContent = sach.ten_the_loai || 'Chưa phân loại';
      document.getElementById('book-genre-pill').textContent = sach.ten_the_loai || 'Chưa phân loại';
      document.getElementById('book-year').textContent = sach.nam_xuat_ban || 'N/A';
      document.getElementById('book-publisher').textContent = sach.ten_nxb || 'N/A';
      document.getElementById('book-lang').textContent = sach.ten_ngon_ngu || 'N/A';
      document.getElementById('book-isbn').textContent = sach.isbn || 'N/A';
      document.getElementById('book-shelf').textContent = `Kệ: ${sach.ma_ke || 'Chưa xếp'} — ${sach.vi_tri || ''}`;

      const rating = parseFloat(sach.danh_gia) || 5.0;
      const full = Math.round(rating);
      let stars = '';
      for (let i = 1; i <= 5; i++) stars += (i <= full ? '★' : '☆');
      document.getElementById('book-rating').innerHTML =
        `<span class="stars">${stars}</span> <span class="rating-num">${rating.toFixed(1)}</span>`;

      const summaryEl = document.getElementById('book-summary');
      if (sach.tom_tat && sach.tom_tat.trim()) {
        summaryEl.textContent = sach.tom_tat;
        summaryEl.classList.remove('summary-empty');
      } else {
        summaryEl.textContent = 'Tóm tắt cho tác phẩm này đang được cập nhật. Vui lòng quay lại sau.';
        summaryEl.classList.add('summary-empty');
      }

      const statusEl = document.getElementById('book-status');
      if (sach.so_luong_ton > 0) {
        statusEl.textContent = `● CÒN ${sach.so_luong_ton} CUỐN`; statusEl.style.color = 'var(--ok)';
      } else {
        statusEl.textContent = `● ĐÃ HẾT`; statusEl.style.color = 'var(--err)';
        document.getElementById('btn-borrow').style.display = 'none';
      }

      const coverContainer = document.getElementById('cover-container');
      if (sach.anh_bia) {
        coverContainer.innerHTML = `<img src="${sach.anh_bia}" class="detail-cover" alt="Bìa sách">`;
      } else {
        coverContainer.innerHTML = `<div class="detail-cover" style="display:grid; place-items:center;"><div style="color: var(--gold); font-size: 44px;">✦</div></div>`;
      }

      document.getElementById('detail-wrapper').style.display = 'block';
      syncFavBtn();
      loadRelated(sach.id_the_loai, sach.id_sach);
    } catch (error) { alert("Đã xảy ra lỗi khi tải dữ liệu sách!"); }
  }

  /* ---------- Sách cùng thể loại ---------- */
  async function loadRelated(genreId, currentId){
    if (!genreId) return;
    try {
      const res = await fetch(`/api/books?id_the_loai=${genreId}`);
      if (!res.ok) return;
      let list = await res.json();
      if (!Array.isArray(list)) return;
      list = list.filter(b => b.id_sach != currentId).slice(0, 6);
      if (!list.length) return;

      document.getElementById('related-grid').innerHTML = list.map(b => `
        <a class="rel-card" href="?id=${b.id_sach}">
          ${ b.anh_bia
              ? `<img class="rel-cover" src="${b.anh_bia}" alt="">`
              : `<div class="rel-cover rel-cover-ph">✦</div>` }
          <div class="rel-body">
            <div class="rel-title">${b.tieu_de || ''}</div>
            <div class="rel-author">${b.tac_gia || ''}</div>
          </div>
        </a>`).join('');
      document.getElementById('related-panel').style.display = 'block';
    } catch(e) { /* im lặng nếu API chưa hỗ trợ lọc theo thể loại */ }
  }

  document.addEventListener('DOMContentLoaded', fetchBookDetail);

  /* ---------- Đặt trước / mượn sách ---------- */
  document.getElementById('btn-borrow').addEventListener('click', async () => {
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token || !user) {
      alert("✦ Vui lòng đăng nhập bằng Thẻ Độc giả để thực hiện đặt trước!");
      window.location.href = '/login.html';
      return;
    }
    if (!confirm(`Bạn có chắc chắn muốn đặt trước cuốn sách này không?`)) return;

    try {
      const btn = document.getElementById('btn-borrow');
      btn.textContent = "ĐANG XỬ LÝ..."; btn.disabled = true;

      const response = await fetch('/api/borrows/dat-truoc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ id_doc_gia: user.id_tai_khoan, id_sach: bookId })
      });
      const result = await response.json();

      if (response.ok) {
        alert("🎉 ĐẶT TRƯỚC THÀNH CÔNG!\nSách đã được giữ chỗ cho bạn. Vui lòng đến quầy để nhận.");
        window.location.reload();
      } else {
        alert("✗ KHÔNG THỂ ĐẶT TRƯỚC:\n" + result.message);
        btn.textContent = "MƯỢN TÁC PHẨM NÀY"; btn.disabled = false;
      }
    } catch (error) {
      alert("Mất kết nối tới Hệ thống!");
      document.getElementById('btn-borrow').textContent = "MƯỢN TÁC PHẨM NÀY";
      document.getElementById('btn-borrow').disabled = false;
    }
  });
</script>
</body>
</html>
